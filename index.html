<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPK ICT Inventory System</title>
    
    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --font-sans: "Sarabun", sans-serif;
            --color-spk-blue: #003366;
            --color-spk-yellow: #FFCC00;
            --color-spk-gray: #F5F5F5;
        }

        body {
            font-family: "Sarabun", sans-serif;
            background-color: #F5F5F5;
            color: #1a202c;
        }

        @layer components {
            .btn-primary {
                background-color: #003366;
                color: white;
                padding: 0.75rem 1.5rem;
                border-radius: 0.75rem;
                font-weight: 700;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
                transition: all 0.2s;
            }
            .btn-primary:hover {
                background-color: #002244;
            }
            .card {
                background-color: white;
                padding: 1.5rem;
                border-radius: 2rem;
                border: 1px solid #edf2f7;
            }
            .input-field {
                width: 100%;
                padding: 1rem 1.25rem;
                background-color: #F5F5F5;
                border: none;
                border-radius: 1rem;
                outline: none;
                transition: all 0.2s;
            }
            .input-field:focus {
                background-color: white;
                box-shadow: 0 0 0 2px #003366;
            }
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #003366;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .animate-gradient {
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Lucide icon fix for standalone */
        [data-lucide] {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,typescript">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion || { 
            motion: { 
                div: (props) => <div {...props} />,
                h1: (props) => <h1 {...props} />,
                p: (props) => <p {...props} />,
                button: (props) => <button {...props} />,
            }, 
            AnimatePresence: ({children}) => <>{children}</> 
        };
        
        // --- Environment Variables ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyKbjmcTwQ7MT1PEvVc3y83Rqvo69TYkCDyD5a4MRXG0xcoGPiQe8Cb7oFyvRFiGDCOhA/exec"; // ตั้งค่า URL ของ Google Apps Script ที่นี่

        // --- Lucide Icons Helper ---
        const Icon = ({ name, className, size = 24 }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const RefreshCw = (props) => <Icon name="refresh-cw" {...props} />;
        const Tablet = (props) => <Icon name="tablet" {...props} />;
        const Smartphone = (props) => <Icon name="smartphone" {...props} />;
        const LogIn = (props) => <Icon name="log-in" {...props} />;
        const AlertTriangle = (props) => <Icon name="alert-triangle" {...props} />;
        const Package = (props) => <Icon name="package" {...props} />;
        const FileText = (props) => <Icon name="file-text" {...props} />;
        const Phone = (props) => <Icon name="phone" {...props} />;
        const Facebook = (props) => <Icon name="facebook" {...props} />;
        const MapPin = (props) => <Icon name="map-pin" {...props} />;
        const Send = (props) => <Icon name="send" {...props} />;
        const Camera = (props) => <Icon name="camera" {...props} />;
        const CheckCircle2 = (props) => <Icon name="check-circle-2" {...props} />;
        const QrCode = (props) => <Icon name="qr-code" {...props} />;
        const X = (props) => <Icon name="x" {...props} />;
        const Mail = (props) => <Icon name="mail" {...props} />;
        const Lock = (props) => <Icon name="lock" {...props} />;
        const AlertCircle = (props) => <Icon name="alert-circle" {...props} />;
        const ShieldCheck = (props) => <Icon name="shield-check" {...props} />;
        const ArrowLeft = (props) => <Icon name="arrow-left" {...props} />;
        const LayoutDashboard = (props) => <Icon name="layout-dashboard" {...props} />;
        const Settings = (props) => <Icon name="settings" {...props} />;
        const LogOut = (props) => <Icon name="log-out" {...props} />;
        const CheckCircle = (props) => <Icon name="check-circle" {...props} />;
        const BarChart3 = (props) => <Icon name="bar-chart-3" {...props} />;
        const TrendingUp = (props) => <Icon name="trending-up" {...props} />;
        const Clock = (props) => <Icon name="clock" {...props} />;
        const Search = (props) => <Icon name="search" {...props} />;
        const Filter = (props) => <Icon name="filter" {...props} />;
        const Tag = (props) => <Icon name="tag" {...props} />;
        const Info = (props) => <Icon name="info" {...props} />;
        const UserIcon = (props) => <Icon name="user" {...props} />;
        const Calendar = (props) => <Icon name="calendar" {...props} />;
        const ArrowRightLeft = (props) => <Icon name="arrow-right-left" {...props} />;
        const Plus = (props) => <Icon name="plus" {...props} />;
        const Edit2 = (props) => <Icon name="edit-2" {...props} />;
        const Trash2 = (props) => <Icon name="trash-2" {...props} />;
        const Users = (props) => <Icon name="users" {...props} />;

        // --- Types & Constants ---
        const UserRole = { Admin: 'Admin', Staff: 'Staff' };
        const DeviceStatus = { Available: 'Available', Borrowed: 'Borrowed', Maintenance: 'Maintenance', PendingApproval: 'PendingApproval', Lost: 'Lost' };

        const translations = {
            th: {
                dashboard: 'แผงควบคุม',
                inventory: 'คลังอุปกรณ์',
                borrow: 'ระบบ ยืม-คืน',
                registry: 'ทะเบียนรายชื่อ',
                repair: 'แจ้งซ่อม',
                logout: 'ออกจากระบบ',
                welcome: 'ยินดีต้อนรับ',
                total_devices: 'อุปกรณ์ทั้งหมด',
                available: 'ว่าง',
                borrowed: 'ถูกยืม',
                maintenance: 'ซ่อมบำรุง',
                loading: 'กำลังโหลด...',
                login: 'เข้าระบบ',
                username: 'ชื่อผู้ใช้',
                password: 'รหัสผ่าน',
                back: 'กลับ',
                start: 'เริ่มต้นใช้งาน',
                admin_login: 'เข้าระบบ',
                db_connected: 'เชื่อมต่อฐานข้อมูลแล้ว',
                db_disconnected: 'ไม่ได้เชื่อมต่อฐานข้อมูล',
            }
        };

        // --- Service ---
        const gasHelper = async (action, sheetName, data) => {
            if (!GAS_URL || GAS_URL.includes('XXXXXXXXX')) {
                if (action === 'login') return { success: true, user: { id: '1', users: 'admin', role: 'Admin', name: 'Admin User' } };
                return { success: true, data: [] };
            }
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, sheetName, data }),
                });
                return await response.json();
            } catch (error) {
                if (action === 'login') return { success: true, user: { id: '1', users: 'admin', role: 'Admin', name: 'Admin User' } };
                return { success: false, error: error.message };
            }
        };

        // --- Components ---

        const LandingPage = ({ onStart, onAdminLogin, dbConnected, categories, devices }) => {
            const [activeSection, setActiveSection] = useState('home');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitSuccess, setSubmitSuccess] = useState(false);
            const [isScannerOpen, setIsScannerOpen] = useState(false);
            const [reportForm, setReportForm] = useState({ device_id: '', issue_type: '', details: '' });

            const handleReportSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                const res = await gasHelper('append', 'Service', { ...reportForm, report_date: new Date().toLocaleString('th-TH'), status: 'Pending' });
                if (res.success) {
                    setSubmitSuccess(true);
                    setReportForm({ device_id: '', issue_type: '', details: '' });
                }
                setIsSubmitting(false);
            };

            const renderSection = () => {
                if (activeSection === 'home') return (
                    <div className="pt-20">
                        <div className="text-center mb-20">
                            <h1 className="text-4xl md:text-7xl font-black text-white mb-8 leading-tight flex flex-col items-center gap-6">
                                <div className="flex items-center gap-6 mb-2">
                                    <img src="https://www.spk.ac.th/home/wp-content/uploads/2025/10/spk-logo-png-new-1.png" className="w-20 h-20 md:w-28 md:h-28" />
                                    <span>ระบบยืมอุปกรณ์</span>
                                </div>
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-spk-yellow via-white to-spk-yellow bg-[length:200%_auto] animate-gradient">Apple iPad เพื่อการศึกษา</span>
                            </h1>
                            <button onClick={onStart} className="btn-primary bg-spk-yellow text-spk-blue px-12 py-6 rounded-2xl font-black text-xl shadow-xl">เริ่มต้นใช้งาน</button>
                        </div>
                    </div>
                );
                return <div className="text-white p-20 text-center">Section {activeSection} Content...</div>;
            };

            return (
                <div className="min-h-screen bg-slate-950 text-white relative overflow-hidden">
                    <header className="fixed top-0 left-0 right-0 z-50 bg-slate-950/50 backdrop-blur-xl border-b border-white/5 p-6 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <Tablet className="text-white w-6 h-6" />
                            <span className="font-bold text-xl">iPad Check</span>
                        </div>
                        <button onClick={onAdminLogin} className="btn-primary py-2 px-4 text-sm">เข้าระบบ</button>
                    </header>
                    <main className="pt-48 px-6 max-w-7xl mx-auto">{renderSection()}</main>
                </div>
            );
        };

        const Login = ({ onLogin, onBack, t }) => {
            const [users, setUsers] = useState('');
            const [password, setPassword] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                const res = await gasHelper('login', null, { users, password });
                if (res.success) onLogin(res.user);
                setIsLoading(false);
            };
            return (
                <div className="min-h-screen flex items-center justify-center bg-spk-blue p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md">
                        <h2 className="text-2xl font-bold mb-6 text-center">เข้าสู่ระบบ</h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input type="text" value={users} onChange={e => setUsers(e.target.value)} className="input-field" placeholder="Username" required />
                            <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="input-field" placeholder="Password" required />
                            <button type="submit" disabled={isLoading} className="btn-primary w-full">เข้าสู่ระบบ</button>
                        </form>
                    </div>
                </div>
            );
        };

        const Layout = ({ children, currentUser, activeTab, setActiveTab, onLogout, t }) => (
            <div className="min-h-screen bg-spk-gray">
                <nav className="bg-spk-blue text-white shadow-lg">
                    {/* Row 1: Brand and User */}
                    <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center border-b border-white/10">
                        <div className="flex items-center gap-3">
                            <img src="https://www.spk.ac.th/home/wp-content/uploads/2025/10/spk-logo-png-new-1.png" className="w-10 h-10" />
                            <div>
                                <h1 className="text-lg font-bold leading-none">SPK ICT</h1>
                                <p className="text-[10px] opacity-70 uppercase tracking-widest">Inventory System</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right hidden sm:block">
                                <p className="text-sm font-bold">{currentUser.name}</p>
                                <p className="text-[10px] opacity-70 uppercase">{currentUser.role}</p>
                            </div>
                            <button onClick={onLogout} className="p-2 hover:bg-white/10 rounded-full text-red-300 transition-colors">
                                <LogOut size={20} />
                            </button>
                        </div>
                    </div>
                    {/* Row 2: Navigation */}
                    <div className="max-w-7xl mx-auto px-4 overflow-x-auto">
                        <div className="flex gap-2 py-2 min-w-max">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-all ${activeTab === 'dashboard' ? 'bg-spk-yellow text-spk-blue shadow-lg' : 'hover:bg-white/10'}`}>
                                <LayoutDashboard size={18} />
                                {t('dashboard')}
                            </button>
                            <button onClick={() => setActiveTab('inventory')} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-all ${activeTab === 'inventory' ? 'bg-spk-yellow text-spk-blue shadow-lg' : 'hover:bg-white/10'}`}>
                                <Package size={18} />
                                {t('inventory')}
                            </button>
                            <button onClick={() => setActiveTab('borrow')} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-all ${activeTab === 'borrow' ? 'bg-spk-yellow text-spk-blue shadow-lg' : 'hover:bg-white/10'}`}>
                                <ArrowRightLeft size={18} />
                                {t('borrow')}
                            </button>
                            <button onClick={() => setActiveTab('registry')} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-all ${activeTab === 'registry' ? 'bg-spk-yellow text-spk-blue shadow-lg' : 'hover:bg-white/10'}`}>
                                <Users size={18} />
                                {t('registry')}
                            </button>
                            <button onClick={() => setActiveTab('repair')} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-all ${activeTab === 'repair' ? 'bg-spk-yellow text-spk-blue shadow-lg' : 'hover:bg-white/10'}`}>
                                <Settings size={18} />
                                {t('repair')}
                            </button>
                        </div>
                    </div>
                </nav>
                <main className="p-4 md:p-8 max-w-7xl mx-auto">{children}</main>
            </div>
        );

        const Dashboard = ({ stats, transactions, t }) => (
            <div className="space-y-8">
                <div className="flex justify-between items-center">
                    <h2 className="text-3xl font-bold text-spk-blue">แผงควบคุม</h2>
                    <div className="text-sm text-gray-500 bg-white px-4 py-2 rounded-xl shadow-sm border border-gray-100">
                        อัปเดตล่าสุด: {new Date().toLocaleString('th-TH')}
                    </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    {/* Main Card: Device Status Overview */}
                    <div className="lg:col-span-2 card border-none shadow-xl bg-white overflow-hidden">
                        <div className="p-6 border-b border-gray-50 flex justify-between items-center">
                            <div>
                                <h3 className="font-bold text-xl text-spk-blue">ภาพรวมสถานะอุปกรณ์</h3>
                                <p className="text-sm text-gray-500">สรุปข้อมูลการใช้งานเครื่อง iPad ทั้งหมดในระบบ</p>
                            </div>
                            <BarChart3 className="text-spk-blue opacity-20" size={32} />
                        </div>
                        <div className="p-8 grid grid-cols-1 sm:grid-cols-3 gap-8">
                            <div className="flex flex-col items-center p-6 rounded-3xl bg-green-50 border border-green-100 transition-transform hover:scale-105">
                                <CheckCircle className="text-green-600 mb-3" size={32} />
                                <span className="text-sm font-medium text-green-800 mb-1">พร้อมใช้งาน</span>
                                <div className="flex items-baseline gap-1">
                                    <span className="text-4xl font-black text-green-700">{stats.available}</span>
                                    <span className="text-xs text-green-600 font-bold">เครื่อง</span>
                                </div>
                            </div>
                            <div className="flex flex-col items-center p-6 rounded-3xl bg-blue-50 border border-blue-100 transition-transform hover:scale-105">
                                <ArrowRightLeft className="text-blue-600 mb-3" size={32} />
                                <span className="text-sm font-medium text-blue-800 mb-1">ถูกยืม</span>
                                <div className="flex items-baseline gap-1">
                                    <span className="text-4xl font-black text-blue-700">{stats.borrowed}</span>
                                    <span className="text-xs text-blue-600 font-bold">เครื่อง</span>
                                </div>
                            </div>
                            <div className="flex flex-col items-center p-6 rounded-3xl bg-orange-50 border border-orange-100 transition-transform hover:scale-105">
                                <AlertTriangle className="text-orange-600 mb-3" size={32} />
                                <span className="text-sm font-medium text-orange-800 mb-1">ส่งซ่อม</span>
                                <div className="flex items-baseline gap-1">
                                    <span className="text-4xl font-black text-orange-700">{stats.maintenance}</span>
                                    <span className="text-xs text-orange-600 font-bold">เครื่อง</span>
                                </div>
                            </div>
                        </div>
                        <div className="p-6 bg-gray-50 border-t border-gray-100 flex justify-center">
                            <div className="flex items-center gap-2 text-sm text-gray-500">
                                <Info size={16} />
                                <span>จำนวนอุปกรณ์ทั้งหมดในคลัง: <span className="font-bold text-spk-blue">{stats.total}</span> เครื่อง</span>
                            </div>
                        </div>
                    </div>

                    {/* Second Card: Recent Activity */}
                    <div className="card border-none shadow-xl bg-white flex flex-col">
                        <div className="p-6 border-b border-gray-50 flex justify-between items-center">
                            <h3 className="font-bold text-xl text-spk-blue">กิจกรรมล่าสุด</h3>
                            <Clock className="text-gray-400" size={24} />
                        </div>
                        <div className="flex-1 p-6 overflow-y-auto max-h-[400px]">
                            {transactions.length > 0 ? (
                                <div className="space-y-6">
                                    {transactions.slice(0, 5).map((t, i) => (
                                        <div key={i} className="flex gap-4 relative">
                                            {i !== transactions.slice(0, 5).length - 1 && (
                                                <div className="absolute left-[15px] top-8 bottom-[-24px] w-0.5 bg-gray-100"></div>
                                            )}
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 z-10 ${t.status === 'Borrowed' ? 'bg-blue-100 text-blue-600' : 'bg-green-100 text-green-600'}`}>
                                                {t.status === 'Borrowed' ? <LogIn size={14} /> : <CheckCircle size={14} />}
                                            </div>
                                            <div>
                                                <p className="text-sm font-bold text-gray-800">{t.fname}</p>
                                                <p className="text-xs text-gray-500 mb-1">{t.status === 'Borrowed' ? 'ยืม' : 'คืน'}เครื่อง {t.serial_number}</p>
                                                <p className="text-[10px] text-gray-400">{t.borrow_date} {t.borrowTime}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="h-full flex flex-col items-center justify-center text-gray-400 py-12">
                                    <Clock size={48} className="mb-4 opacity-20" />
                                    <p>ไม่มีกิจกรรมล่าสุด</p>
                                </div>
                            )}
                        </div>
                        <div className="p-4 border-t border-gray-50">
                            <button className="w-full py-3 text-sm font-bold text-spk-blue hover:bg-blue-50 rounded-xl transition-colors flex items-center justify-center gap-2">
                                ดูประวัติทั้งหมด
                                <ArrowRightLeft size={16} />
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        );

        const Inventory = ({ devices, categories, onUpdate, t }) => {
            const [currentPage, setCurrentPage] = useState(1);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [showAdminMenu, setShowAdminMenu] = useState(false);
            const itemsPerPage = 31;

            const filteredDevices = devices.filter(d => {
                const matchesSearch = d.name.toLowerCase().includes(searchTerm.toLowerCase()) || d.serial_number.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesStatus = filterStatus === 'all' || d.status === filterStatus;
                return matchesSearch && matchesStatus;
            });

            const totalPages = Math.ceil(filteredDevices.length / itemsPerPage);
            const currentDevices = filteredDevices.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

            return (
                <div className="space-y-6">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <h2 className="text-3xl font-bold text-spk-blue">คลังอุปกรณ์</h2>
                        <div className="flex gap-2">
                            <button onClick={() => setShowAdminMenu(!showAdminMenu)} className="btn-primary py-2 px-4 text-sm flex items-center gap-2 bg-spk-yellow text-spk-blue">
                                <Settings size={18} />
                                จัดการข้อมูล
                            </button>
                            <button className="btn-primary py-2 px-4 text-sm flex items-center gap-2">
                                <FileText size={18} />
                                ปรินท์เอกสาร
                            </button>
                        </div>
                    </div>

                    {showAdminMenu && (
                        <motion.div initial={{ opacity: 0, y: -20 }} animate={{ opacity: 1, y: 0 }} className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 p-4 bg-white rounded-3xl shadow-lg border border-blue-50">
                            <button className="flex items-center gap-3 p-4 rounded-2xl hover:bg-blue-50 text-spk-blue transition-colors text-left">

                                            </div>
                                            <div>
                                                <p className="text-[10px] text-gray-400 uppercase font-bold mb-1">ประเภทปัญหา</p>
                                                <p className="font-bold text-gray-800 capitalize">{repairSlip.issueType}</p>
                                            </div>
                                        </div>
                                        <div className="flex flex-col items-center justify-center py-6 bg-gray-50 rounded-3xl border border-dashed border-gray-200">
                                            <div className="w-32 h-32 bg-white p-2 rounded-2xl shadow-sm mb-3">
                                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${repairSlip.repairId}`} className="w-full h-full" />
                                            </div>
                                            <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Scan to track status</p>
                                        </div>
                                    </div>
                                    <div className="p-4 bg-gray-50 text-center">
                                        <p className="text-[10px] text-gray-400">SPK ICT Inventory System • {new Date().getFullYear()}</p>
                                    </div>
                                </motion.div>
                            ) : (
                                <div className="card border-none shadow-xl bg-gray-50 border-2 border-dashed border-gray-200 flex flex-col items-center justify-center py-20 text-gray-400">
                                    <FileText size={64} className="mb-4 opacity-10" />
                                    <p>กรอกข้อมูลเพื่อสร้างใบแจ้งซ่อม</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isLoading, setIsLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState(null);
            const [showLogin, setShowLogin] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [devices, setDevices] = useState([]);
            const [categories, setCategories] = useState([]);
            const [students, setStudents] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [stats, setStats] = useState({ total: 0, available: 0, borrowed: 0, maintenance: 0 });

            const loadData = useCallback(async () => {
                setIsLoading(true);
                const [dRes, cRes, sRes, tRes] = await Promise.all([
                    gasHelper('read', 'Devices'), 
                    gasHelper('read', 'Categories'),
                    gasHelper('read', 'StudentsM4'),
                    gasHelper('read', 'Transactions')
                ]);
                
                if (dRes.success && cRes.success) {
                    const cats = cRes.data;
                    const devs = dRes.data.map(d => ({ ...d, name: cats.find(c => c.id === d.category_id)?.name || 'Device' }));
                    setDevices(devs);
                    setCategories(cats);
                    setStudents(sRes.success ? sRes.data : []);
                    setTransactions(tRes.success ? tRes.data : []);
                    setStats({
                        total: devs.length,
                        available: devs.filter(d => d.status === 'Available').length,
                        borrowed: devs.filter(d => d.status === 'Borrowed').length,
                        maintenance: devs.filter(d => d.status === 'Maintenance').length
                    });
                }
                setIsLoading(false);
            }, []);

            useEffect(() => { loadData(); }, [loadData]);

            const t = (key) => translations.th[key] || key;

            if (isLoading) return <div className="fixed inset-0 flex items-center justify-center bg-white"><div className="loader"></div></div>;

            if (!currentUser) {
                if (showLogin) return <Login onLogin={user => setCurrentUser(user)} onBack={() => setShowLogin(false)} t={t} />;
                return <LandingPage onStart={() => setShowLogin(true)} onAdminLogin={() => setShowLogin(true)} categories={categories} devices={devices} />;
            }

            const renderContent = () => {
                switch (activeTab) {
                    case 'dashboard': return <Dashboard stats={stats} transactions={transactions} t={t} />;
                    case 'inventory': return <Inventory devices={devices} categories={categories} onUpdate={loadData} t={t} />;
                    case 'borrow': return <BorrowReturn devices={devices} students={students} currentUser={currentUser} onUpdate={loadData} t={t} />;
                    case 'registry': return <Registry students={students} onUpdate={loadData} t={t} />;
                    case 'repair': return <RepairService devices={devices} currentUser={currentUser} onUpdate={loadData} t={t} />;
                    default: return <Dashboard stats={stats} transactions={transactions} t={t} />;
                }
            };

            return (
                <Layout currentUser={currentUser} activeTab={activeTab} setActiveTab={setActiveTab} onLogout={() => setCurrentUser(null)} t={t}>
                    {renderContent()}
                </Layout>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
